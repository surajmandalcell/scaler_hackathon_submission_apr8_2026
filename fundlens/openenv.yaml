name: fundlens
version: 0.2.0
description: >
  FundLens — Real Estate PE Fund NAV Bridge & Performance Environment.
  An AI agent uses MCP tools to query fund data, compute 8-line NAV bridges,
  and calculate performance metrics (MOIC, IRR) across 3 difficulty levels.
  Fund data covers Indian real estate: Office, Residential, Industrial,
  and Data Center sectors with quarterly income cashflows.

tasks:
  - id: easy
    description: >
      RE Alpha Fund I — 3 properties (Office, Residential, Industrial), all 100% owned.
      Compute the 8-line NAV bridge only (beginning_nav → ending_nav).
    difficulty: easy
    graded_items: 8

  - id: medium
    description: >
      RE Beta Fund II — 5 properties including a Data Center, all 100% owned.
      Compute the 8-line NAV bridge AND fund-level MOIC.
    difficulty: medium
    graded_items: 9

  - id: hard
    description: >
      Cross-fund view — Alpha, Beta, Gamma. Prestige Tower co-invested across funds
      (Beta 40%, Gamma 35%). Compute NAV bridge + MOIC + IRR for the primary fund.
    difficulty: hard
    graded_items: 10

action_space: MCP tool calls (CallToolAction)
observation_space: Tool responses as JSON (FundLensObservation)
reward_range: [0.0, 1.0]
entry_point: fundlens.server.app:app

tools:
  - get_available_filters
  - get_portfolio_summary
  - get_nav_bridge
  - get_irr
  - compare_funds
  - get_sector_report
  - get_deal_exposure
  - submit_report
